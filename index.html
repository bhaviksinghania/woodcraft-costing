<!DOCTYPE html>
<html>
<head>
<title>Woodcraft Original</title>
</head>

<body style="font-family:Arial;padding:30px">

<h1>Woodcraft Original</h1>

<h2>Acrylic Costing Pro</h2>

Length:
<input type="number" id="L"><br><br>

Breadth:
<input type="number" id="B"><br><br>

Height:
<input type="number" id="H"><br><br>

<button onclick="test()">Calculate</button>

<p id="result"></p>

<script>
function test(){
let L=document.getElementById('L').value;
let B=document.getElementById('B').value;
let H=document.getElementById('H').value;

document.getElementById('result').innerHTML=
"Size : "+L+" x "+B+" x "+H;
}
</script>

</body>
</html>
